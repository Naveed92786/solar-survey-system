<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced To-Do List App</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="css/todo-style.css" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-dark bg-gradient sticky-top">
        <div class="container-lg">
            <a class="navbar-brand fw-bold" href="#">
                <i class="fas fa-tasks"></i> My Todo List
            </a>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-light" id="darkModeBtn" title="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="btn btn-sm btn-info" id="clearAllBtn" title="Clear All Tasks">
                    <i class="fas fa-trash-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-lg py-5">
        <!-- Stats Section -->
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <i class="fas fa-list-check"></i>
                    <div>
                        <div class="stat-label">Total Tasks</div>
                        <div class="stat-value" id="totalTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <i class="fas fa-check-circle"></i>
                    <div>
                        <div class="stat-label">Completed</div>
                        <div class="stat-value" id="completedTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <i class="fas fa-hourglass-half"></i>
                    <div>
                        <div class="stat-label">Pending</div>
                        <div class="stat-value" id="pendingTasks">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="stat-card">
                    <i class="fas fa-percentage"></i>
                    <div>
                        <div class="stat-label">Progress</div>
                        <div class="stat-value" id="progressPercentage">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="progress-section mb-4">
            <div class="progress" style="height: 25px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated" 
                     id="progressBar" role="progressbar" style="width: 0%;"></div>
            </div>
        </div>

        <!-- Input Section -->
        <div class="card shadow-sm mb-4 input-card">
            <div class="card-body">
                <form id="todoForm" class="d-flex gap-2 flex-wrap">
                    <div class="flex-grow-1" style="min-width: 250px;">
                        <input type="text" class="form-control form-control-lg" id="todoInput" 
                               placeholder="What needs to be done?" required>
                    </div>
                    <select class="form-select form-select-lg" id="prioritySelect" style="max-width: 120px;">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <select class="form-select form-select-lg" id="categorySelect" style="max-width: 120px;">
                        <option value="personal">Personal</option>
                        <option value="work">Work</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                    <button type="submit" class="btn btn-lg btn-success">
                        <i class="fas fa-plus"></i> Add Task
                    </button>
                </form>
            </div>
        </div>

        <!-- Filter Section -->
        <div class="card shadow-sm mb-4 filter-card">
            <div class="card-body">
                <div class="d-flex gap-2 flex-wrap">
                    <div class="flex-grow-1" style="min-width: 200px;">
                        <input type="text" class="form-control" id="searchInput" 
                               placeholder="Search tasks...">
                    </div>
                    <select class="form-select" id="filterStatus" style="max-width: 120px;">
                        <option value="all">All</option>
                        <option value="active">Active</option>
                        <option value="completed">Completed</option>
                    </select>
                    <select class="form-select" id="filterPriority" style="max-width: 120px;">
                        <option value="all">All Priority</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <select class="form-select" id="filterCategory" style="max-width: 120px;">
                        <option value="all">All Categories</option>
                        <option value="personal">Personal</option>
                        <option value="work">Work</option>
                        <option value="shopping">Shopping</option>
                        <option value="health">Health</option>
                        <option value="other">Other</option>
                    </select>
                    <select class="form-select" id="sortSelect" style="max-width: 120px;">
                        <option value="date-desc">Newest</option>
                        <option value="date-asc">Oldest</option>
                        <option value="priority">Priority</option>
                        <option value="name">A-Z</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Tasks Section -->
        <div id="tasksContainer">
            <!-- Tasks will be loaded here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-5">
            <i class="fas fa-inbox" style="font-size: 3rem; color: #ccc;"></i>
            <h4 class="mt-3 text-muted">No tasks yet</h4>
            <p class="text-muted">Add a new task to get started!</p>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title"><i class="fas fa-edit"></i> Edit Task</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="editForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Task Title</label>
                            <input type="text" class="form-control" id="editTitle" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Priority</label>
                            <select class="form-select" id="editPriority">
                                <option value="low">Low</option>
                                <option value="medium">Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-select" id="editCategory">
                                <option value="personal">Personal</option>
                                <option value="work">Work</option>
                                <option value="shopping">Shopping</option>
                                <option value="health">Health</option>
                                <option value="other">Other</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Due Date</label>
                            <input type="date" class="form-control" id="editDueDate">
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="editCompleted">
                            <label class="form-check-label" for="editCompleted">
                                Mark as completed
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container-lg text-center">
            <p class="mb-0">© 2024 Advanced To-Do List App. All Rights Reserved.</p>
            <small class="text-muted">Your data is saved locally in your browser.</small>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="js/todo-app.js"></script>
</body>
</html>
